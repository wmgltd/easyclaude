<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="rgba(0,0,0,0.4)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="url(#bg)"/>

  <rect x="80" y="80" width="864" height="864" rx="200" ry="200"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <g transform="translate(512 512)" filter="url(#glow)">
    <path d="M -180 -130 L -10 0 L -180 130"
          fill="none" stroke="white" stroke-width="60"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="60" y="-30" width="200" height="60" rx="12" ry="12" fill="white"/>
  </g>

  <text x="512" y="880" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, sans-serif"
        font-size="78" font-weight="700"
        fill="rgba(255,255,255,0.92)" letter-spacing="-2">
    EasyClaude
  </text>
</svg>
