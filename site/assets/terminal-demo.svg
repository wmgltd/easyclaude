<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720"
     font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace"
     role="img"
     aria-label="Animated PikudClaude demo: type in one project, switch to another, ask in Hebrew, read a Hebrew + English answer, open Settings">

  <style>
    /* Each line / group fades in at its offset and fades out near the end of
       the 24-second loop. Layered groups (bepay pane, pikud pane, settings
       overlay) toggle in/out at scene boundaries. */

    .line   { opacity: 0; animation: 24s linear infinite }
    .pane   { opacity: 0; animation: 24s linear infinite }
    .hl     { opacity: 0; animation: 24s linear infinite }
    .cursor { opacity: 0; animation: 24s linear infinite }
    .modal  { opacity: 0; animation: 24s linear infinite }

    /* Scene 1 — bepay active, English Bash exchange (0s → 6.5s) */
    .hl-bepay    { animation-name: hl-bepay }
    .pane-bepay  { animation-name: pane-bepay }
    .b1 { animation-name: b1 }
    .b2 { animation-name: b2 }
    .b3 { animation-name: b3 }
    .b4 { animation-name: b4 }
    .b5 { animation-name: b5 }

    /* Scene 2 — switch to pikudclaude, Hebrew question + mixed answer
       (6.5s → 15s) */
    .hl-pikud    { animation-name: hl-pikud }
    .pane-pikud  { animation-name: pane-pikud }
    .p1 { animation-name: p1 }
    .p2 { animation-name: p2 }
    .p3 { animation-name: p3 }
    .p4 { animation-name: p4 }
    .p5 { animation-name: p5 }
    .cursor-pikud { animation-name: cursor-pikud }

    /* Scene 3 — Settings dialog overlay (15s → 21s) */
    .modal-settings { animation-name: modal-settings }

    /* Each keyframe set: hidden, fade in at start, hold, fade out at end. */
    @keyframes hl-bepay   { 0%   { opacity: 1 } 27% { opacity: 1 } 30%, 100% { opacity: 0 } }
    @keyframes pane-bepay { 0%   { opacity: 1 } 26% { opacity: 1 } 28%, 100% { opacity: 0 } }
    @keyframes b1 { 0%, 2%  { opacity: 0 } 3%,  26% { opacity: 1 } 28%, 100% { opacity: 0 } }
    @keyframes b2 { 0%, 5%  { opacity: 0 } 6%,  26% { opacity: 1 } 28%, 100% { opacity: 0 } }
    @keyframes b3 { 0%, 10% { opacity: 0 } 11%, 26% { opacity: 1 } 28%, 100% { opacity: 0 } }
    @keyframes b4 { 0%, 14% { opacity: 0 } 15%, 26% { opacity: 1 } 28%, 100% { opacity: 0 } }
    @keyframes b5 { 0%, 18% { opacity: 0 } 19%, 26% { opacity: 1 } 28%, 100% { opacity: 0 } }

    @keyframes hl-pikud   { 0%, 27% { opacity: 0 } 30%, 88% { opacity: 1 } 92%, 100% { opacity: 0 } }
    @keyframes pane-pikud { 0%, 27% { opacity: 0 } 30%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes p1 { 0%, 30% { opacity: 0 } 32%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes p2 { 0%, 33% { opacity: 0 } 35%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes p3 { 0%, 40% { opacity: 0 } 42%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes p4 { 0%, 45% { opacity: 0 } 47%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes p5 { 0%, 50% { opacity: 0 } 52%, 60% { opacity: 1 } 65%, 100% { opacity: 0 } }
    @keyframes cursor-pikud {
      0%,  52% { opacity: 0 }
      53%, 54% { opacity: 1 } 55%, 56% { opacity: 0 }
      57%, 58% { opacity: 1 } 59%, 60% { opacity: 0 }
      65%, 100% { opacity: 0 }
    }

    @keyframes modal-settings { 0%, 62% { opacity: 0 } 65%, 87% { opacity: 1 } 90%, 100% { opacity: 0 } }

    /* Sidebar items are always visible — only the highlight under one of
       them changes. */
  </style>

  <!-- ════════ Background ════════ -->
  <rect width="1200" height="720" fill="#0b0b10" rx="16" ry="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#15151f" rx="16" ry="16"/>
  <rect x="0" y="40" width="1200" height="16" fill="#15151f"/>
  <circle cx="28" cy="28" r="7" fill="#ff5f57"/>
  <circle cx="54" cy="28" r="7" fill="#febc2e"/>
  <circle cx="80" cy="28" r="7" fill="#28c940"/>
  <text x="600" y="33" fill="#8a8aa3" font-size="14" text-anchor="middle">PikudClaude · multi-session terminal hub for Claude Code</text>

  <!-- ════════ Sidebar ════════ -->
  <rect x="0" y="56" width="220" height="664" fill="#0e0e16"/>
  <text x="32" y="100" fill="#ffffff" font-size="14" font-weight="700">PikudClaude</text>

  <!-- Highlight under bepay (scene 1) and pikudclaude (scenes 2-3) -->
  <rect class="hl hl-bepay" x="20" y="170" width="180" height="40" rx="8" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
  <rect class="hl hl-pikud" x="20" y="130" width="180" height="40" rx="8" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1"/>

  <!-- Sidebar items -->
  <g font-size="13">
    <circle cx="40" cy="150" r="5" fill="#7c3aed"/>
    <text x="56" y="155" fill="#ffffff">pikudclaude</text>
    <text x="180" y="155" fill="#6e6e80" font-size="11" text-anchor="end">⌘1</text>

    <circle cx="40" cy="190" r="5" fill="#3b82f6"/>
    <text x="56" y="195" fill="#ffffff">bepay</text>
    <text x="180" y="195" fill="#6e6e80" font-size="11" text-anchor="end">⌘2</text>

    <circle cx="40" cy="235" r="5" fill="#10b981"/>
    <text x="56" y="240" fill="#c0c0d0">beplus</text>
    <text x="180" y="240" fill="#6e6e80" font-size="11" text-anchor="end">⌘3</text>

    <circle cx="40" cy="275" r="5" fill="#a855f7"/>
    <text x="56" y="280" fill="#c0c0d0">wabi.do</text>
    <text x="180" y="280" fill="#6e6e80" font-size="11" text-anchor="end">⌘4</text>

    <circle cx="40" cy="315" r="5" fill="#f59e0b"/>
    <text x="56" y="320" fill="#c0c0d0">doxbox</text>
    <text x="180" y="320" fill="#6e6e80" font-size="11" text-anchor="end">⌘5</text>

    <circle cx="40" cy="355" r="5" fill="#ef4444"/>
    <text x="56" y="360" fill="#c0c0d0">supervision</text>
    <text x="180" y="360" fill="#6e6e80" font-size="11" text-anchor="end">⌘6</text>

    <circle cx="40" cy="395" r="5" fill="#06b6d4"/>
    <text x="56" y="400" fill="#c0c0d0">maimon</text>
    <text x="180" y="400" fill="#6e6e80" font-size="11" text-anchor="end">⌘7</text>
  </g>

  <!-- ════════ Scene 1: bepay pane — Claude doing real git work ════════ -->
  <g class="pane pane-bepay" font-size="15" fill="#d4d4dc">

    <text x="260" y="100" class="line b1">
      <tspan fill="#7c3aed" font-weight="700">$ </tspan>claude
    </text>

    <text x="260" y="135" class="line b2" fill="#a78bfa">
      ⏺ <tspan fill="#d4d4dc">Bash(</tspan>git status<tspan fill="#d4d4dc">)</tspan>
    </text>
    <text x="290" y="160" class="line b2" fill="#9aa1ad">
      ⎿  On branch main · up to date with 'origin/main'
    </text>

    <text x="260" y="200" class="line b3" fill="#a78bfa">
      ⏺ <tspan fill="#d4d4dc">Bash(</tspan>git diff --stat HEAD<tspan fill="#d4d4dc">)</tspan>
    </text>
    <text x="290" y="225" class="line b3" fill="#9aa1ad">
      ⎿   frontend/src/components/OnboardingWizard.tsx   | 77 <tspan fill="#ef4444">------</tspan>
    </text>
    <text x="305" y="245" class="line b3" fill="#9aa1ad">
      src/views/admin/DashboardOverview.tsx             |  7 <tspan fill="#10b981">+</tspan><tspan fill="#ef4444">-</tspan>
    </text>

    <text x="260" y="285" class="line b4" fill="#a78bfa">
      ⏺ <tspan fill="#d4d4dc">Bash(</tspan>git commit -m "feat(onboarding): floating corner pill"<tspan fill="#d4d4dc">)</tspan>
    </text>
    <text x="290" y="310" class="line b4" fill="#9aa1ad">
      ⎿  [<tspan fill="#10b981">main 42dbce1</tspan>] 7 files changed, <tspan fill="#10b981">220 insertions(+)</tspan>, <tspan fill="#ef4444">113 deletions(-)</tspan>
    </text>

    <text x="260" y="355" class="line b5" fill="#ede9fe">
      ⏺ Pushed cleanly. Ready for the next feature.
    </text>
  </g>

  <!-- ════════ Scene 2: switch (⌘1) → pikudclaude — Hebrew exchange ════════
       Hebrew lines use direction="rtl" so the whole line reads right-to-left,
       and text-anchor="start" with x at the right edge places the natural
       RTL start (the right side) at that x. This mirrors how PikudClaude
       flips a row whenever it contains Hebrew characters. -->
  <g class="pane pane-pikud" font-size="15" fill="#d4d4dc">

    <text x="260" y="100" class="line p1">
      <tspan fill="#7c3aed" font-weight="700">$ </tspan>claude --continue
    </text>

    <!-- User types in Hebrew — line is RTL, right-aligned at x=1150 -->
    <text x="1150" y="145" class="line p2" direction="rtl" text-anchor="start" fill="#d4d4dc">
      <tspan fill="#7c3aed">&gt;</tspan> למה ה־MutationObserver שלי לא תופס תוספות בתוך iframe?
    </text>

    <!-- Claude responds: Hebrew with inline English (RTL line) -->
    <text x="1150" y="195" class="line p3" direction="rtl" text-anchor="start" fill="#ede9fe">
      <tspan fill="#a78bfa">●</tspan> כל iframe הוא document נפרד — צריך לחבר observer בכל אחד.
    </text>

    <!-- Pure-code lines stay LTR -->
    <text x="260" y="245" class="line p4">
      <tspan fill="#f472b6">for</tspan> (<tspan fill="#f472b6">const</tspan> frame <tspan fill="#f472b6">of</tspan> document.querySelectorAll(<tspan fill="#10b981">'iframe'</tspan>)) {
    </text>
    <text x="260" y="270" class="line p4">
      <tspan xml:space="preserve">  </tspan>observer.observe(frame.contentDocument.body, opts);
    </text>
    <text x="260" y="295" class="line p4">
      }
    </text>

    <!-- Final Hebrew line mixed with English/code object (RTL line) -->
    <text x="1150" y="345" class="line p5" direction="rtl" text-anchor="start" fill="#ede9fe">
      <tspan fill="#a78bfa">●</tspan> אל תשכח <tspan fill="#a78bfa">{ subtree: true }</tspan> אחרת זה לא יזהה הוספות עמוקות.
    </text>

    <!-- Cursor at the end of the last RTL Hebrew line (its visual left edge).
         Approximate left position for x=1150 anchored line text. -->
    <rect class="cursor cursor-pikud" x="338" y="330" width="9" height="18" fill="#ffffff"/>
  </g>

  <!-- ════════ Scene 3: Settings dialog overlay ════════
       The dialog itself uses a sans-serif UI font (overrides the SVG-wide
       mono default) so it matches how the real app renders settings. -->
  <g class="modal modal-settings" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
    <!-- Dim background -->
    <rect width="1200" height="720" fill="rgba(0,0,0,0.55)"/>
    <!-- Dialog -->
    <rect x="320" y="120" width="560" height="480" rx="12" ry="12" fill="#1a1a26" stroke="#2c2c38" stroke-width="1"/>

    <!-- Title -->
    <text x="350" y="160" fill="#ffffff" font-size="18" font-weight="700">Settings</text>

    <!-- Tabs row — comfortable spacing, About inside the dialog (the fix!) -->
    <g font-size="13" font-weight="500">
      <text x="350" y="200" fill="#ffffff">Notifications</text>
      <rect x="345" y="208" width="98" height="2" fill="#7c3aed"/>
      <text x="468" y="200" fill="#8a8aa3">Sessions</text>
      <text x="554" y="200" fill="#8a8aa3">Appearance</text>
      <text x="648" y="200" fill="#8a8aa3">Shortcuts</text>
      <text x="725" y="200" fill="#8a8aa3">Updates</text>
      <text x="795" y="200" fill="#8a8aa3">About</text>
    </g>
    <line x1="345" y1="215" x2="855" y2="215" stroke="#2c2c38" stroke-width="1"/>

    <!-- NOTIFICATIONS heading -->
    <text x="350" y="250" fill="#8a8aa3" font-size="11" font-weight="600" letter-spacing="1.5">NOTIFICATIONS</text>

    <!-- Sound on awaiting -->
    <rect x="350" y="270" width="18" height="18" rx="4" fill="#7c3aed"/>
    <path d="M 355 279 l 4 4 l 8 -8" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <text x="378" y="284" fill="#ffffff" font-size="14">Sound on awaiting</text>
    <rect x="568" y="271" width="78" height="22" rx="4" fill="transparent" stroke="#2c2c38" stroke-width="1"/>
    <text x="582" y="287" fill="#d4d4dc" font-size="12">Chime ▾</text>

    <!-- System notifications + dock bounce -->
    <rect x="350" y="310" width="18" height="18" rx="4" fill="#7c3aed"/>
    <path d="M 355 319 l 4 4 l 8 -8" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <text x="378" y="324" fill="#ffffff" font-size="14">System notifications + dock bounce</text>

    <!-- Only when unfocused -->
    <rect x="350" y="350" width="18" height="18" rx="4" fill="transparent" stroke="#2c2c38" stroke-width="1"/>
    <text x="378" y="364" fill="#c0c0d0" font-size="14">Only when window is unfocused</text>

    <!-- Quiet hours -->
    <rect x="350" y="390" width="18" height="18" rx="4" fill="transparent" stroke="#2c2c38" stroke-width="1"/>
    <text x="378" y="404" fill="#c0c0d0" font-size="14">Quiet hours</text>
    <rect x="540" y="392" width="64" height="22" rx="4" fill="#0e0e16" stroke="#2c2c38" stroke-width="1"/>
    <text x="572" y="408" fill="#c0c0d0" font-size="12" text-anchor="middle">22:00</text>
    <text x="612" y="408" fill="#6e6e80" font-size="12">→</text>
    <rect x="624" y="392" width="64" height="22" rx="4" fill="#0e0e16" stroke="#2c2c38" stroke-width="1"/>
    <text x="656" y="408" fill="#c0c0d0" font-size="12" text-anchor="middle">08:00</text>

    <!-- Buttons -->
    <rect x="690" y="550" width="70" height="32" rx="6" fill="transparent" stroke="#2c2c38" stroke-width="1"/>
    <text x="725" y="572" fill="#c0c0d0" font-size="13" text-anchor="middle">Cancel</text>
    <rect x="770" y="550" width="80" height="32" rx="6" fill="#7c3aed"/>
    <text x="810" y="572" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Save</text>
  </g>

  <!-- ════════ Status bar (always visible) ════════ -->
  <rect x="220" y="676" width="980" height="44" fill="#0e0e16"/>
  <text x="240" y="703" fill="#10b981" font-size="12">● 7 sessions</text>
  <text x="700" y="703" fill="#6e6e80" font-size="12" text-anchor="middle">⌘K palette · ⌘1–⌘9 switch · ⌘, settings · ⌘B bookmark</text>
  <text x="1180" y="703" fill="#6e6e80" font-size="12" text-anchor="end">pikud.io</text>

</svg>
